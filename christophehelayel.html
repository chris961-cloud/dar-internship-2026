<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christophe Helayel | Portfolio</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0d1117;
            font-family: 'Segoe UI', sans-serif;
            color: #e6edf3;
        }

        .card {
            text-align: center;
            padding: 48px 64px;
            border: 1px solid #30363d;
            border-radius: 12px;
            background: #161b22;
            max-width: 480px;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 8px;
            letter-spacing: 1px;
        }

        .role {
            color: #8b949e;
            margin: 0 0 16px;
            font-size: 1rem;
        }

        .tag {
            display: inline-block;
            font-size: 0.85rem;
            color: #58a6ff;
            border: 1px solid #58a6ff44;
            border-radius: 20px;
            padding: 4px 14px;
            margin-top: 12px;
            letter-spacing: 0.5px;
        }

        .info {
            margin-top: 24px;
            text-align: left;
            font-size: 0.95rem;
            color: #c9d1d9;
            line-height: 1.6;
        }

        .info span {
            color: #58a6ff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Christophe Helayel</h1>
        <p class="role">IT Intern &mdash; Dar Internship Program 2026</p>
        <div class="info">
            <p><span>Track:</span> ICT Service Management / AI</p>
            <p><span>Skills:</span> Networking, Git &amp; GitHub, Python</p>
            <p><span>Focus:</span> Learning practical IT support and version control workflows</p>
        </div>
        <div class="tag">Github Exercise</div>
    </div>
</body>
</html>
