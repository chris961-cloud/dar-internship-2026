<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Git & GitHub Demo Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <header class="site-header" aria-labelledby="site-title">
      <h1 id="site-title">Git & GitHub Demo Lab</h1>
      <p>A shared repo for practicing branches, pull requests, reviews, and GitHub Pages.</p>
    </header>

    <section class="gallery" aria-labelledby="gallery-title">
      <div class="section-heading">
        <h2 id="gallery-title">Gallery</h2>
        <p id="gallery-count" aria-live="polite">Loading entries</p>
      </div>
      <div id="gallery" class="gallery-grid" aria-live="polite"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
